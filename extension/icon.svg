<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="48" height="48" rx="9" fill="#0F172A"/>

  <!-- Portal fill inside gate -->
  <path d="M12.75,46 L12.75,23 A11.25,11.25 0 0 0 35.25,23 L35.25,46 Z"
        fill="#1D4ED8" opacity="0.3"/>

  <!-- Arrow shaft (behind gate) -->
  <rect x="1" y="30" width="40" height="6" rx="1" fill="#EA580C"/>

  <!-- Gate halo -->
  <path d="M11,46 L11,23 A13,13 0 0 0 37,23 L37,46"
        stroke="#93C5FD" stroke-width="8" fill="none" opacity="0.15"/>

  <!-- Gate main stroke -->
  <path d="M11,46 L11,23 A13,13 0 0 0 37,23 L37,46"
        stroke="#3B82F6" stroke-width="3.5" fill="none" filter="url(#glow)"/>

  <!-- Arrowhead (front, right of gate) -->
  <polygon points="39,27 47,33 39,39" fill="#EA580C" filter="url(#glow)"/>
</svg>
