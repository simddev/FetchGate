<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <title>FetchGate</title>

  <!-- Orange arrow shaft — drawn first so the left gate post overlays it,
       giving the impression the arrow is entering from the left. -->
  <rect x="0" y="20" width="42" height="8" rx="1" fill="#EA580C"/>

  <!-- Blue gate: left post (7px wide), right post (7px wide), top crossbeam (7px tall).
       Right post kept at x=33 so its right edge aligns with the arrowhead base (x=40). -->
  <rect x="5"  y="5" width="7"  height="38" rx="2" fill="#2563EB"/>
  <rect x="33" y="5" width="7"  height="38" rx="2" fill="#2563EB"/>
  <rect x="5"  y="5" width="35" height="7"  rx="2" fill="#2563EB"/>

  <!-- Right portion of shaft — drawn after the gate so it overlaps the right
       post, connecting shaft to arrowhead and showing the arrow exiting.
       Starts 2px before the right post (x=33) to cover anti-aliasing seam. -->
  <rect x="31" y="20" width="11" height="8" fill="#EA580C"/>

  <!-- Arrowhead — drawn last, clearly in front of the right post.
       Taller (y=13–35) to stay proportional with the wider shaft. -->
  <polygon points="40,13 48,24 40,35" fill="#EA580C"/>
</svg>
